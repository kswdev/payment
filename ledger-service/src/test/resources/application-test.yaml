spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=MySQL;DATABASE_TO_UPPER=false
    username: sa
    password:
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  cloud:
    stream:
      bindings:
        consume-in-0:
          group: ledger-service
          consumer:
            max-attempts: 3

logging:
  level:
    root: warn
    net.study: debug
